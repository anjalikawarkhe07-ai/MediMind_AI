<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MediMind AI | Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#0f172a,#1e3a8a,#2563eb);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

/* Background */

body::before{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    background:#38bdf8;
    border-radius:50%;
    filter:blur(180px);
    top:-120px;
    left:-120px;
    opacity:.4;
}

body::after{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    background:#22c55e;
    border-radius:50%;
    filter:blur(180px);
    bottom:-120px;
    right:-120px;
    opacity:.3;
}

.login-card{
    position:relative;
    z-index:2;
    width:420px;
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:22px;
    padding:40px;
    color:white;
    box-shadow:0 15px 40px rgba(0,0,0,.25);
}

.logo{
    width:75px;
    height:75px;
    margin:auto;
    border-radius:50%;
    background:linear-gradient(135deg,#22c55e,#3b82f6);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:34px;
    margin-bottom:18px;
}

h1{
    text-align:center;
    font-size:30px;
}

.subtitle{
    text-align:center;
    color:#dbeafe;
    font-size:14px;
    margin-top:8px;
    margin-bottom:35px;
}

.input-group{
    margin-bottom:22px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    font-size:14px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
}

.input-group input::placeholder{
    color:#d1d5db;
}

.options{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:14px;
    margin-bottom:25px;
}

.options a{
    color:#93c5fd;
    text-decoration:none;
}

.options a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background:linear-gradient(135deg,#10b981,#2563eb);
    color:white;
    font-size:16px;
    font-weight:600;
    transition:.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(37,99,235,.4);
}

.divider{
    text-align:center;
    margin:28px 0;
    color:#cbd5e1;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    top:50%;
    width:38%;
    height:1px;
    background:rgba(255,255,255,.2);
}

.divider::before{
    left:0;
}

.divider::after{
    right:0;
}

.social{
    display:flex;
    gap:15px;
}

.social button{
    background:rgba(255,255,255,.12);
    border:1px solid rgba(255,255,255,.2);
    font-size:15px;
}

.social button:hover{
    background:rgba(255,255,255,.18);
}

.signup{
    text-align:center;
    margin-top:30px;
    color:#dbeafe;
    font-size:14px;
}

.signup a{
    color:#7dd3fc;
    text-decoration:none;
    font-weight:600;
}

.signup a:hover{
    text-decoration:underline;
}

@media(max-width:480px){

.login-card{
    width:92%;
    padding:28px;
}

}
</style>

</head>
<body>

<div class="login-card">

<div class="logo">
🩺
</div>

<h1>MediMind AI</h1>

<p class="subtitle">
Smart Healthcare Powered by Artificial Intelligence
</p>

<form id="loginForm">

<div class="input-group">
<label>Email</label>
<input
type="email"
placeholder="Enter your email"
required>
</div>

<div class="input-group">
<label>Password</label>
<input
type="password"
placeholder="Enter your password"
required>
</div>

<div class="options">

<label>
<input type="checkbox">
 Remember Me
</label>

<a href="#">Forgot Password?</a>

</div>

<button type="submit">
Login
</button>

<div class="divider">
OR
</div>

<div class="social">

<button type="button">
Google
</button>

<button type="button">
GitHub
</button>

</div>

</form>

<div class="signup">
Don't have an account?
<a href="#">Create Account</a>
</div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit",function(e){

e.preventDefault();

alert("Login Successful! Welcome to MediMind AI.");

});

</script>
<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    window.location.href = "MediMindAIDashboard.html";
});
</script>

</body>
</html>
</body>
</html>
